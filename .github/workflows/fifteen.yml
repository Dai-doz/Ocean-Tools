name: Ocean Tools 15

on:
  workflow_dispatch:
    inputs:
      BRANCH:
        description: "Branch"
        required: true
        default: "fifteen"
      STOCK_DEVICE:
        description: "Your Device"
        required: true
        default: "SM-A127F"
      TARGET_DEVICE:
        description: "Base Devices"
        required: true
        default: "SM-A145F"
      TARGET_DEVICE_CSC:
        description: "Base Devices Region [CSC]"
        required: true
        default: "XXV"
      TARGET_DEVICE_IMEI:
        description: "Base Devices IMEI"
        required: true
        default: "350514853640379"
      OUTPUT_FILESYSTEM:
        description: "Compress FS : erofs / ext4"
        required: true
        default: "erofs"
      COMPRESS_IMG_TO_XZ:
        description: "Compress ROM ? [False/True]"
        required: true
        default: "True"

jobs:
  build:
    name: Starting Ocean Tools 15 Process
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository.
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.BRANCH }}

      - name: Cleaning junk files
        uses: rokibhasansagar/slimhub_actions@v25.42.5

      - name: Install Dependencies.
        run: |
          sudo apt update
          sudo apt install -y p7zip-full lz4 liblz4-1 liblz4-dev libzstd1 libzstd-dev build-essential android-sdk-libsparse-utils f2fs-tools fuse2fs fuse e2fsprogs python3 python3-pip zipalign unzip openjdk-21-jdk jq perl xxd kmod erofs-utils linux-modules-extra-$(uname -r)
          sudo modprobe f2fs
          sudo pip3 install git+https://github.com/SN-Abdullah-Al-Noman/samloader.git --break-system-packages
          mkdir -p FW WORK OUT

      - name: Download firmware ▶️ ${{ github.event.inputs.TARGET_DEVICE }} - ${{ github.event.inputs.TARGET_DEVICE_CSC }}
        run: |
          source scripts/OceanScript.sh
          DOWNLOAD_FIRMWARE "${{ github.event.inputs.TARGET_DEVICE }}" "${{ github.event.inputs.TARGET_DEVICE_CSC }}" "${{ github.event.inputs.TARGET_DEVICE_IMEI }}" "FW"

      - name: Extract firmware
        run: |
          source scripts/OceanScript.sh
          EXTRACT_FIRMWARE "FW/${{ github.event.inputs.TARGET_DEVICE }}"

      - name: Start Rom Build For ${{ github.event.inputs.STOCK_DEVICE }}
        run: |
          sudo bash fifteen.sh "${{ github.event.inputs.STOCK_DEVICE }}" \
            "${{ github.event.inputs.TARGET_DEVICE }}" \
            "${{ github.event.inputs.TARGET_DEVICE_CSC }}" \
            "${{ github.event.inputs.TARGET_DEVICE_IMEI }}" \
            "${{ github.event.inputs.OUTPUT_FILESYSTEM }}"

      - name: Compress *.img & make zip file before upload.
        run: |
          echo "BUILD_TIME=$(TZ='Asia/Dhaka' date '+%Y-%m-%d %I:%M:%S %p UTC+6')" >> $GITHUB_ENV

          OUT_DIR="$(pwd)/OUT"
          ZIP_NAME="${{ github.event.inputs.TARGET_DEVICE }}_Port_For_${{ github.event.inputs.STOCK_DEVICE }}.zip"
          ZIP_PATH="$OUT_DIR/$ZIP_NAME"

          if [ "${{ github.event.inputs.COMPRESS_IMG_TO_XZ }}" = "True" ]; then
            echo "Compressing all .img files to .xz (level 9)..."
            for img in "$OUT_DIR"/*.img; do
              [ -f "$img" ] || continue
              echo "Compressing $img"
              sudo xz -9 -T0 "$img"
            done
            sudo rm -f "$OUT_DIR"/*.img
          fi

          echo "Creating zip: $ZIP_NAME"
          7z a -tzip "$ZIP_PATH" "$OUT_DIR"/* -mx=5

          echo "ZIP_PATH=$ZIP_PATH" >> $GITHUB_ENV

      - name: Upload file in GoFile & Create Release.
        env:
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
          STOCK_DEVICE: ${{ github.event.inputs.STOCK_DEVICE }}
          TARGET_DEVICE: ${{ github.event.inputs.TARGET_DEVICE }}
          OUTPUT_FILESYSTEM: ${{ github.event.inputs.OUTPUT_FILESYSTEM }}
          COMPRESS_IMG_TO_XZ: ${{ github.event.inputs.COMPRESS_IMG_TO_XZ }}
        run: |
          bash release.sh

      - name: Clean everything.
        run: sudo rm -rf *
